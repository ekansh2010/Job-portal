<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post a Job – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Job<span>Portal</span></a>
      <ul class="navbar-nav ms-auto align-items-center" id="nav-actions">
        <li class="nav-item"><a class="nav-link" href="jobs.html">Browse Jobs</a></li>
        <li class="nav-item"><a class="nav-link btn-nav-login ms-2" href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Header -->
  <div style="background:linear-gradient(135deg,#1e3a8a,#2563eb);padding:36px 0;color:#fff;">
    <div class="container">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:6px;">Post a New Job</h1>
      <p style="opacity:0.8;margin:0;">Fill in the details below to list your job opening</p>
    </div>
  </div>

  <div class="container" style="padding:40px 0 80px;">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="job-card" style="cursor:default;">

          <h5 style="font-weight:700;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:14px;">📋 Job Details</h5>

          <form id="postJobForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Job Title *</label>
                <input type="text" class="form-control" id="jobTitle" placeholder="e.g. Frontend Developer" required/>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Company Name *</label>
                <input type="text" class="form-control" id="companyName" placeholder="e.g. TechCorp Pvt Ltd" required/>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Job Location *</label>
                <input type="text" class="form-control" id="jobLocation" placeholder="e.g. Bangalore, India" required/>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Job Type *</label>
                <select class="form-select" id="jobType" required>
                  <option value="">-- Select --</option>
                  <option>Full-time</option>
                  <option>Part-time</option>
                  <option>Remote</option>
                  <option>Internship</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Category *</label>
                <select class="form-select" id="jobCategory" required>
                  <option value="">-- Select --</option>
                  <option>Technology</option>
                  <option>Design</option>
                  <option>Marketing</option>
                  <option>Data Science</option>
                  <option>Finance</option>
                  <option>Business</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Salary Range</label>
                <input type="text" class="form-control" id="jobSalary" placeholder="e.g. ₹8L – ₹12L/year"/>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Company Emoji (optional)</label>
              <input type="text" class="form-control" id="companyEmoji" placeholder="e.g. 💻 🎨 📊" maxlength="4" style="width:120px;"/>
              <small class="text-muted">Used as company logo placeholder</small>
            </div>

            <div class="mb-3">
              <label class="form-label">Job Description *</label>
              <textarea class="form-control" id="jobDescription" rows="5" placeholder="Describe the role, responsibilities, and what the candidate will do..." required></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label">Requirements (comma-separated) *</label>
              <input type="text" class="form-control" id="jobRequirements" placeholder="e.g. React.js, 2+ years exp, REST APIs, Git" required/>
              <small class="text-muted">Separate each requirement with a comma</small>
            </div>

            <button type="submit" class="btn-primary-custom" style="font-size:1rem;">Post Job Listing 🚀</button>
          </form>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/jobs.js"></script>
</body>
</html>
