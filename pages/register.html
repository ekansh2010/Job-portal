<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Job<span>Portal</span></a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="jobs.html">Browse Jobs</a></li>
        <li class="nav-item"><a class="nav-link btn-nav-login ms-2" href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="form-card" style="max-width:520px;">
      <h2>Create Account 🎉</h2>
      <p class="sub">Join JobPortal to start applying for jobs or posting vacancies.</p>
      <div id="authAlert" style="display:none;"></div>
      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label" for="regName">Full Name</label>
          <input type="text" class="form-control" id="regName" placeholder="e.g. Rahul Sharma" required/>
        </div>
        <div class="mb-3">
          <label class="form-label" for="regEmail">Email Address</label>
          <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required/>
        </div>
        <div class="mb-3">
          <label class="form-label" for="regRole">I am a...</label>
          <select class="form-select" id="regRole" required>
            <option value="">-- Select Role --</option>
            <option value="jobseeker">Job Seeker</option>
            <option value="recruiter">Recruiter / Employer</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label" for="regPassword">Password</label>
          <input type="password" class="form-control" id="regPassword" placeholder="Min. 6 characters" required/>
        </div>
        <div class="mb-3">
          <label class="form-label" for="regConfirm">Confirm Password</label>
          <input type="password" class="form-control" id="regConfirm" placeholder="Re-enter password" required/>
        </div>
        <div class="mb-3" style="font-size:0.84rem;color:var(--secondary);">
          <input type="checkbox" required style="margin-right:6px;"/>
          I agree to the <a href="#" style="color:var(--primary);">Terms & Conditions</a>
        </div>
        <button type="submit" class="btn-primary-custom">Create My Account</button>
      </form>
      <p class="text-center mt-4" style="font-size:0.88rem;color:var(--secondary);">
        Already have an account? <a href="login.html" style="color:var(--primary);font-weight:500;">Login here</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
