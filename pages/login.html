<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Job<span>Portal</span></a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="jobs.html">Browse Jobs</a></li>
        <li class="nav-item"><a class="nav-link btn-nav-register ms-2" href="register.html">Register</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="form-card">
      <h2>Welcome Back 👋</h2>
      <p class="sub">Login to your account to browse and apply for jobs.</p>
      <div id="authAlert" style="display:none;"></div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required/>
        </div>
        <div class="mb-3">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required/>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-2" style="font-size:0.85rem;">
          <label style="color:var(--secondary);cursor:pointer;">
            <input type="checkbox" style="margin-right:4px;"/> Remember me
          </label>
          <a href="#" style="color:var(--primary);text-decoration:none;">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary-custom">Login to Account</button>
      </form>
      <p class="text-center mt-4" style="font-size:0.88rem;color:var(--secondary);">
        Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:500;">Register here</a>
      </p>
      <div style="background:#f8fafc;border-radius:8px;padding:12px;margin-top:16px;font-size:0.82rem;color:#64748b;border:1px solid #e2e8f0;">
        💡 <strong>Demo:</strong> Register an account first, then login with those credentials.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
