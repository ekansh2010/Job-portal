<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Detail – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Job<span>Portal</span></a>
      <ul class="navbar-nav ms-auto align-items-center" id="nav-actions">
        <li class="nav-item"><a class="nav-link" href="jobs.html">← Back to Jobs</a></li>
        <li class="nav-item"><a class="nav-link btn-nav-login ms-2" href="login.html">Login</a></li>
        <li class="nav-item"><a class="nav-link btn-nav-register ms-2" href="register.html">Register</a></li>
      </ul>
    </div>
  </nav>

  <div class="container section-padding">
    <div class="row">

      <!-- Job Detail -->
      <div class="col-lg-8 mb-4">
        <div id="jobDetailContainer">
          <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
      </div>

      <!-- Apply Sidebar -->
      <div class="col-lg-4">
        <div class="filter-card" style="position:sticky;top:80px;">
          <h5>Apply for this Job</h5>

          <!-- Success message (hidden initially) -->
          <div id="applySuccess" style="display:none;text-align:center;padding:20px 0;">
            <div style="font-size:3rem;">🎉</div>
            <h6 class="mt-2">Application Submitted!</h6>
            <p style="font-size:0.85rem;color:var(--secondary);">We'll review your application and get back to you soon.</p>
            <a href="jobs.html" class="btn-primary-custom" style="display:inline-block;padding:10px 20px;width:auto;text-decoration:none;border-radius:8px;margin-top:8px;">Browse More Jobs</a>
          </div>

          <!-- Apply Form -->
          <form id="applyForm">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Your name" required/>
            </div>
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" placeholder="your@email.com" required/>
            </div>
            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" placeholder="+91 00000 00000"/>
            </div>
            <div class="mb-3">
              <label class="form-label">Upload Resume</label>
              <input type="file" class="form-control" accept=".pdf,.doc,.docx"/>
              <small class="text-muted" style="font-size:0.78rem;">PDF or DOC, max 5MB</small>
            </div>
            <div class="mb-3">
              <label class="form-label">Cover Letter (optional)</label>
              <textarea class="form-control" rows="3" placeholder="Tell us why you're a good fit..."></textarea>
            </div>
            <button type="submit" class="btn-primary-custom">Submit Application 🚀</button>
          </form>

        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/jobs.js"></script>
</body>
</html>
